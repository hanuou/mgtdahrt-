<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>みがってであふれた、</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #eff1f5;
    color: #4c4f69;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ── CAPTION ── */
  #caption {
    position: absolute;
    max-width: 600px;
    padding: 0 2rem;
    text-align: center;
    line-height: 1.85;
    font-size: clamp(13px, 1.6vw, 16px);
    letter-spacing: 0.04em;
    opacity: 1;
    transition: opacity 1s ease;
  }

  #caption.hidden { opacity: 0; pointer-events: none; }

  /* ── WORKS ── */
  #works {
    display: flex;
    gap: clamp(20px, 6vw, 64px);
    align-items: flex-start;
    opacity: 0;
    transition: opacity 1s ease;
    pointer-events: none;
  }

  #works.visible {
    opacity: 1;
    pointer-events: auto;
  }

  #background-sprinkle {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
  }

  .sprinkle {
    position: absolute;
    white-space: pre;
    color: rgb(199, 178, 255);
    user-select: none;
    pointer-events: none;
  }

  .work {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
  }

  .thumb {
    width: clamp(140px, 28vw, 260px);
    height: clamp(140px, 28vw, 260px);
    background: #d8dae5;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: #8c8fa1;
    transition: opacity 0.15s ease;
    overflow: hidden;
  }

  .work:hover .thumb { opacity: 0.75; }

  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .work-num {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: #8c8fa1;
  }
</style>
</head>
<body>

<p id="caption">
  みがってであふれた、
</p>

<div id="works">
  <a class="work" href="work.html?id=1">
    <div class="thumb"><img src="../image/1.png" alt="Work 1"></div>
  </a>
  <a class="work" href="work.html?id=2">
    <div class="thumb"><img src="../image/2.png" alt="Work 2"></div>
  </a>
  <a class="work" href="work.html?id=3">
    <div class="thumb"><img src="../image/3.png" alt="Work 3"></div>
  </a>
</div>

<script src="script.js"></script>
</body>
</html>
