<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRILOGY</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #eff1f5;
    color: #4c4f69;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ── CAPTION ── */
  #caption {
    position: absolute;
    max-width: 560px;
    padding: 0 2rem;
    text-align: center;
    line-height: 1.85;
    font-size: clamp(13px, 1.6vw, 16px);
    letter-spacing: 0.04em;
    opacity: 1;
    transition: opacity 1s ease;
  }

  #caption.hidden { opacity: 0; pointer-events: none; }

  /* ── PLAYER ── */
  #player-wrap {
    width: min(760px, 92vw);
    opacity: 0;
    transition: opacity 1s ease;
    pointer-events: none;
  }

  #player-wrap.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .video-container {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #d8dae5;
  }

  .video-container iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  .work-title {
    margin-top: 20px;
    font-size: clamp(12px, 1.4vw, 14px);
    letter-spacing: 0.14em;
    text-align: center;
    color: #8c8fa1;
  }

  .work-title strong {
    display: block;
    font-size: clamp(15px, 2vw, 20px);
    letter-spacing: 0.08em;
    color: #4c4f69;
    font-weight: 400;
    margin-bottom: 4px;
  }

  /* ── BACK ── */
  #back {
    position: fixed;
    top: 28px;
    left: 28px;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: #8c8fa1;
    text-decoration: none;
    cursor: pointer;
    transition: color 0.15s ease;
    opacity: 0;
    animation: fadeIn 0.8s 0.5s ease forwards;
  }

  #back:hover { color: #4c4f69; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
<body>

<a id="back" href="intro.html">← BACK</a>

<p id="caption"></p>

<div id="player-wrap">
  <div class="video-container">
    <iframe id="yt-frame" src="" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
  </div>
  <div class="work-title">
    <strong id="title-main"></strong>
    <span id="title-sub"></span>
  </div>
</div>

<script>
  const works = {
    1: {
      caption: '始まりはいつも静かだ。光が差し込む前の、あの短い暗闇。ここから何かが生まれようとしている。私はそれをただ、記録する。',
      title: 'I — GENESIS',
      sub: '2024',
      ytId: 'dQw4w9WgXcQ'
    },
    2: {
      caption: '中間の場所には名前がない。過去でも未来でもない、ただ流れていく今がある。この映像はその流れの中に置かれた、小さな石だ。',
      title: 'II — TRANSIT',
      sub: '2024',
      ytId: 'dQw4w9WgXcQ'
    },
    3: {
      caption: '終わりとは、別の始まりへの入口に過ぎない。三つの断面が重なり合うとき、初めてひとつの輪郭が浮かび上がる。',
      title: 'III — CODA',
      sub: '2024',
      ytId: 'dQw4w9WgXcQ'
    }
  };

  const params = new URLSearchParams(location.search);
  const id = params.get('id') || '1';
  const data = works[id] || works[1];

  document.getElementById('caption').textContent = data.caption;
  document.getElementById('title-main').textContent = data.title;
  document.getElementById('title-sub').textContent = data.sub;
  document.getElementById('yt-frame').src = `https://www.youtube.com/embed/${data.ytId}`;

  const caption = document.getElementById('caption');
  const wrap    = document.getElementById('player-wrap');

  setTimeout(() => {
    caption.classList.add('hidden');
    setTimeout(() => {
      wrap.classList.add('visible');
      document.body.style.overflow = 'auto';
    }, 1000);
  }, 5000);
</script>
</body>
</html>
