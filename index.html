<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRILOGY</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #eff1f5;
    color: #4c4f69;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #jacket {
    width: min(420px, 80vw);
    height: min(420px, 80vw);
    cursor: pointer;
    opacity: 0;
    animation: fadeIn 1.2s ease forwards;
    transition: opacity 0.15s ease;
  }

  #jacket:hover { opacity: 0.85 !important; }

  #jacket img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .jacket-placeholder {
    width: 100%;
    height: 100%;
    background: #d8dae5;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    letter-spacing: 0.12em;
    color: #8c8fa1;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
<body>

<div id="jacket" onclick="window.location.href='intro.html'">
  <!-- ジャケット画像をここに: <img src="jacket.jpg" alt="TRILOGY"> -->
  <div class="jacket-placeholder">JACKET IMAGE</div>
</div>

</body>
</html>
